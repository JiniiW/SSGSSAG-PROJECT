# 워크플로우 이름
name: Java CI/CD with Gradle and Deploy to EC2

# 워크플로우 실행 시점
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 워크플로우 작업 정의
jobs:
  build:
    # 우분투 최신 버전
    runs-on: ubuntu-latest
    # 권한 : 읽기만 가능
    permissions:
      contents: read

    # 깃허브 액션에서 제공하는 checkout 액션 사용
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'

    # Gradle wrapper 파일에 실행 권한을 부여
    - name: Grant execute permission for gradlew
      run: chmod +x ssgssag/gradlew

    # Gradle 빌드 엑션을 이용해서 프로젝트 빌드
    - name: Build with Gradle
      working-directory: ssgssag
      run: ./gradlew clean build

    # 빌드해서 생성된 JAR 파일을 깃허브 아티팩트로 업로드
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ssgssag
        path: ssgssag/build/libs/ssgssag-0.0.1-SNAPSHOT.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # 위의 빌드 작업에서 생성된 JAR 파일을 다운로드
    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ssgssag
        path: ssgssag/build/libs/

    # MySQL 정보를 사용하여 application-db.properties 파일 생성
    - name: Create application-db.properties
      run: |
        echo "spring.datasource.url=${{ secrets.DB_URL }}" > ssgssag/src/main/resources/application-db.properties
        echo "spring.datasource.username=${{ secrets.DB_USERNAME }}" >> ssgssag/src/main/resources/application-db.properties
        echo "spring.datasource.password=${{ secrets.DB_PASSWORD }}" >> ssgssag/src/main/resources/application-db.properties
        echo "spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver" >> ssgssag/src/main/resources/application-db.properties
        
    # EC2에 배포
    - name: Deploy to EC2
      run: |
        # SSH 키를 private_key.pem 파일로 저장
        echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
        chmod 600 private_key.pem
        
        # JAR 파일을 EC2 서버로 복사
        scp -i private_key.pem -o StrictHostKeyChecking=no ssgssag/build/libs/ssgssag-0.0.1-SNAPSHOT.jar ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USERNAME }}/ssgssag.jar
        
        # SSH를 사용하여 EC2 서버에 접속 후, 기존 Java 프로세스 종료 및 새로운 프로세스 실행
        ssh -i private_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "pgrep java | xargs kill -9; nohup java -jar /home/${{ secrets.EC2_USERNAME }}/ssgssag.jar > app.log 2>&1 &"
        
        # private_key.pem 파일 삭제
        rm -f private_key.pem
