name: Java CI with Gradle

# 이 워크플로우는 main 브랜치로의 push와 pull request를 트리거로 실행됩니다.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # GitHub 저장소를 체크아웃합니다.
      - uses: actions/checkout@v4

      # JDK 17을 설정합니다.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle 빌드 스크립트에 실행 권한을 부여합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x ssgssag/gradlew

      # Gradle을 사용하여 프로젝트를 빌드합니다.
      - name: Build with Gradle
        working-directory: ssgssag
        run: ./gradlew clean build

      # 빌드된 파일 목록을 출력하여 디버깅에 도움을 줍니다.
      - name: List files for debugging
        run: ls -la ssgssag/build/libs/

      # 빌드된 JAR 파일을 GitHub Artifact로 업로드합니다.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssgssag
          path: ssgssag/build/libs/ssgssag-0.0.1-SNAPSHOT.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # 빌드된 Artifact를 다운로드하여 배포 준비를 합니다.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ssgssag
          path: ssgssag/build/libs/

      # EC2 인스턴스에 애플리케이션을 배포합니다.
      - name: Deploy to EC2
        run: |
          # EC2 SSH 키를 private_key.pem 파일로 저장합니다.
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          
          # SCP를 사용하여 빌드된 JAR 파일을 EC2 서버로 복사합니다.
          scp -i private_key.pem -o StrictHostKeyChecking=no ssgssag/build/libs/ssgssag-0.0.1-SNAPSHOT.jar ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USERNAME }}/ssgssag.jar
          
          # SSH를 사용하여 EC2 서버에 연결하고 이전 Java 프로세스를 종료하고 새로운 프로세스를 실행합니다.
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "pgrep java | xargs kill -9; nohup java -jar /home/${{ secrets.EC2_USERNAME }}/ssgssag.jar > app.log 2>&1 &"
          
          # 사용한 SSH 키 파일을 삭제합니다.
          rm -f private_key.pem

      # 애플리케이션의 데이터베이스 연결 정보를 설정 파일에 추가합니다.
      - name: Configure application properties
        run: |
          echo "spring.datasource.url=${{ secrets.DB_URL }}" >> ssgssag/src/main/resources/application.properties
          echo "spring.datasource.username=${{ secrets.DB_USERNAME }}" >> ssgssag/src/main/resources/application.properties
          echo "spring.datasource.password=${{ secrets.DB_PASSWORD }}" >> ssgssag/src/main/resources/application.properties
          echo "spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver" >> ssgssag/src/main/resources/application.properties
        working-directory: ${{ github.workspace }}/ssgssag
